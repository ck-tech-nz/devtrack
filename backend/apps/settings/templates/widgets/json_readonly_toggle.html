<div id="jrt-{{ widget.name }}" class="mt-1">
  <!-- Readonly view -->
  <div id="jrt-readonly-{{ widget.name }}">
    <div class="flex items-center justify-between mb-2">
      <span class="text-xs text-gray-400">JSON</span>
      <button type="button"
              onclick="document.getElementById('jrt-readonly-{{ widget.name }}').style.display='none';document.getElementById('jrt-edit-{{ widget.name }}').style.display='block';"
              class="inline-flex items-center gap-1 px-2.5 py-1 text-xs font-medium rounded-md border border-gray-300 text-gray-600 bg-white hover:bg-gray-50 shadow-sm transition dark:bg-gray-800 dark:border-gray-600 dark:text-gray-300 dark:hover:bg-gray-700">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
        编辑
      </button>
    </div>
    <pre class="p-4 rounded-lg bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 text-sm leading-relaxed overflow-x-auto font-mono text-gray-700 dark:text-gray-300" style="max-height:480px; overflow-y:auto;">{{ widget.pretty_json }}</pre>
  </div>

  <!-- Edit view (hidden by default) -->
  <div id="jrt-edit-{{ widget.name }}" style="display:none;">
    <div class="flex items-center justify-between mb-2">
      <span class="text-xs text-gray-400">编辑模式</span>
      <button type="button"
              onclick="document.getElementById('jrt-edit-{{ widget.name }}').style.display='none';document.getElementById('jrt-readonly-{{ widget.name }}').style.display='block';"
              class="inline-flex items-center gap-1 px-2.5 py-1 text-xs font-medium rounded-md border border-gray-300 text-gray-600 bg-white hover:bg-gray-50 shadow-sm transition dark:bg-gray-800 dark:border-gray-600 dark:text-gray-300 dark:hover:bg-gray-700">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
        预览
      </button>
    </div>
    <textarea
      name="{{ widget.name }}"
      id="id_{{ widget.name }}"
      rows="16"
      class="w-full p-4 rounded-lg bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-600 text-sm font-mono text-gray-700 dark:text-gray-300 focus:border-primary-500 focus:ring-primary-500"
      style="min-height:200px;">{{ widget.raw_json }}</textarea>
  </div>

  <!-- Hidden field for readonly submit (carries original value if not edited) -->
  <input type="hidden" id="jrt-hidden-{{ widget.name }}" name="{{ widget.name }}" value="{{ widget.raw_json }}" />
</div>

<script>
(function() {
  var editArea = document.querySelector('#jrt-edit-{{ widget.name }} textarea');
  var hidden = document.getElementById('jrt-hidden-{{ widget.name }}');
  var pre = document.querySelector('#jrt-readonly-{{ widget.name }} pre');

  if (editArea) {
    editArea.addEventListener('input', function() {
      hidden.value = editArea.value;
      // Update the readonly preview
      try {
        var obj = JSON.parse(editArea.value);
        pre.textContent = JSON.stringify(obj, null, 2);
      } catch(e) { /* invalid JSON, keep old preview */ }
    });
  }

  // On form submit, ensure the textarea value wins if edit view was used
  var form = document.querySelector('#jrt-{{ widget.name }}').closest('form');
  if (form) {
    form.addEventListener('submit', function() {
      // If edit area is visible and has content, use it
      var editDiv = document.getElementById('jrt-edit-{{ widget.name }}');
      if (editDiv.style.display !== 'none' && editArea.value) {
        hidden.value = editArea.value;
      }
      // Remove the textarea name so only hidden submits
      editArea.removeAttribute('name');
    });
  }
})();
</script>
