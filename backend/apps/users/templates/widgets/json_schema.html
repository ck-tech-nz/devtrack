<div id="json-widget-{{ widget.json_name }}" style="margin-top: 4px;">
  {% for field in widget.fields %}
  <div style="display: flex; align-items: center; margin-bottom: 8px; gap: 12px;">
    <label style="min-width: 140px; font-weight: normal; font-size: 13px; color: #666;"
           for="id_{{ widget.json_name }}__{{ field.key }}">
      {{ field.label }}
    </label>

    {% if field.type == "boolean" %}
      <input type="checkbox"
             id="id_{{ widget.json_name }}__{{ field.key }}"
             name="{{ widget.json_name }}__{{ field.key }}"
             {% if field.value %}checked{% endif %}
             data-json-field="{{ field.key }}"
             data-json-type="boolean" />

    {% elif field.type == "select" %}
      <select id="id_{{ widget.json_name }}__{{ field.key }}"
              name="{{ widget.json_name }}__{{ field.key }}"
              data-json-field="{{ field.key }}"
              data-json-type="select"
              style="padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px;">
        {% for choice in field.choices %}
          <option value="{{ choice }}" {% if field.value == choice %}selected{% endif %}>{{ choice }}</option>
        {% endfor %}
      </select>

    {% elif field.type == "number" %}
      <input type="number"
             id="id_{{ widget.json_name }}__{{ field.key }}"
             name="{{ widget.json_name }}__{{ field.key }}"
             value="{{ field.value }}"
             data-json-field="{{ field.key }}"
             data-json-type="number"
             style="padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; width: 120px; font-size: 13px;" />

    {% else %}
      <input type="text"
             id="id_{{ widget.json_name }}__{{ field.key }}"
             name="{{ widget.json_name }}__{{ field.key }}"
             value="{{ field.value }}"
             data-json-field="{{ field.key }}"
             data-json-type="text"
             style="padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; width: 240px; font-size: 13px;" />
    {% endif %}
  </div>
  {% endfor %}

  <input type="hidden" name="{{ widget.json_name }}" id="id_{{ widget.json_name }}" value="" />
</div>

<script>
(function() {
  var container = document.getElementById('json-widget-{{ widget.json_name }}');
  var hidden = document.getElementById('id_{{ widget.json_name }}');

  function collect() {
    var result = {};
    var inputs = container.querySelectorAll('[data-json-field]');
    for (var i = 0; i < inputs.length; i++) {
      var el = inputs[i];
      var key = el.getAttribute('data-json-field');
      var type = el.getAttribute('data-json-type');
      if (type === 'boolean') {
        result[key] = el.checked;
      } else if (type === 'number') {
        result[key] = el.value ? parseFloat(el.value) : 0;
      } else {
        result[key] = el.value;
      }
    }
    hidden.value = JSON.stringify(result);
  }

  // 表单提交前组装 JSON
  var form = container.closest('form');
  if (form) {
    form.addEventListener('submit', collect);
  }

  // 初始化隐藏字段
  collect();
})();
</script>
