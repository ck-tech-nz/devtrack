<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="12" fill="#3a1078"/>
  <!-- Wizard hat -->
  <polygon points="50,5 30,42 70,42" fill="#1a0a4e"/>
  <polygon points="50,5 30,42 70,42" fill="none" stroke="#ffd700" stroke-width="1.5"/>
  <ellipse cx="50" cy="42" rx="25" ry="5" fill="#1a0a4e" stroke="#ffd700" stroke-width="1.5"/>
  <!-- WiFi signals on hat -->
  <path d="M42 28 Q50 20 58 28" fill="none" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
  <path d="M45 24 Q50 19 55 24" fill="none" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
  <circle cx="50" cy="30" r="2" fill="#00e5ff"/>
  <!-- Face -->
  <circle cx="50" cy="60" r="20" fill="#f5d6a8"/>
  <!-- Eyes -->
  <circle cx="43" cy="56" r="4" fill="white"/>
  <circle cx="57" cy="56" r="4" fill="white"/>
  <circle cx="43" cy="57" r="2.5" fill="#3a1078"/>
  <circle cx="57" cy="57" r="2.5" fill="#3a1078"/>
  <!-- Star sparkles -->
  <text x="15" y="25" font-size="8" fill="#ffd700">&#x2726;</text>
  <text x="80" y="35" font-size="6" fill="#ffd700">&#x2726;</text>
  <!-- Beard -->
  <path d="M35 68 Q42 82 50 85 Q58 82 65 68" fill="#e0e0e0" opacity="0.9"/>
  <path d="M38 72 Q50 88 62 72" fill="none" stroke="#ccc" stroke-width="0.5"/>
</svg>