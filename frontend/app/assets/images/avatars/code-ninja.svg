<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="12" fill="#1a1a2e"/>
  <!-- Head shape -->
  <circle cx="50" cy="48" r="28" fill="#3a3a5a"/>
  <!-- Mask band -->
  <rect x="22" y="38" width="56" height="16" rx="3" fill="#2a2a4a"/>
  <!-- Eyes -->
  <path d="M34 43 L40 40 L46 43 L40 46 Z" fill="#ff1744"/>
  <path d="M54 43 L60 40 L66 43 L60 46 Z" fill="#ff1744"/>
  <!-- Eye glow -->
  <circle cx="40" cy="43" r="2" fill="#ff5252" opacity="0.5"/>
  <circle cx="60" cy="43" r="2" fill="#ff5252" opacity="0.5"/>
  <!-- Mask tie -->
  <path d="M76 42 Q85 38 92 44" stroke="#2a2a4a" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M76 48 Q85 52 90 50" stroke="#2a2a4a" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Shuriken -->
  <g transform="translate(18,80) scale(0.6)">
    <polygon points="15,0 20,12 15,8 10,12" fill="#888"/>
    <polygon points="30,15 18,20 22,15 18,10" fill="#888"/>
    <polygon points="15,30 10,18 15,22 20,18" fill="#888"/>
    <polygon points="0,15 12,10 8,15 12,20" fill="#888"/>
  </g>
  <!-- Code symbols -->
  <text x="70" y="88" font-family="monospace" font-size="8" fill="#ff1744" opacity="0.6">{;}</text>
</svg>