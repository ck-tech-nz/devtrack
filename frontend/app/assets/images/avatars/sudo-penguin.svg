<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="12" fill="#78909c"/>
  <!-- Body -->
  <ellipse cx="50" cy="58" rx="28" ry="32" fill="#37474f"/>
  <!-- Belly -->
  <ellipse cx="50" cy="62" rx="18" ry="24" fill="#eceff1"/>
  <!-- Head -->
  <ellipse cx="50" cy="30" rx="22" ry="18" fill="#37474f"/>
  <!-- Eyes -->
  <circle cx="42" cy="28" r="6" fill="white"/>
  <circle cx="58" cy="28" r="6" fill="white"/>
  <circle cx="43" cy="29" r="3" fill="#1a1a2e"/>
  <circle cx="59" cy="29" r="3" fill="#1a1a2e"/>
  <circle cx="44" cy="28" r="1.2" fill="white"/>
  <circle cx="60" cy="28" r="1.2" fill="white"/>
  <!-- Beak -->
  <polygon points="50,33 44,39 56,39" fill="#ff8f00"/>
  <!-- Feet -->
  <ellipse cx="40" cy="88" rx="8" ry="4" fill="#ff8f00"/>
  <ellipse cx="60" cy="88" rx="8" ry="4" fill="#ff8f00"/>
  <!-- Flippers -->
  <ellipse cx="22" cy="55" rx="6" ry="16" fill="#37474f" transform="rotate(15, 22, 55)"/>
  <ellipse cx="78" cy="55" rx="6" ry="16" fill="#37474f" transform="rotate(-15, 78, 55)"/>
  <!-- sudo text -->
  <text x="50" y="96" font-family="monospace" font-size="7" fill="#76ff03" text-anchor="middle">$ sudo !!</text>
</svg>