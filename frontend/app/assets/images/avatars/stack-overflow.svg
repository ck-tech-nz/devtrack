<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="12" fill="#f48024"/>
  <!-- Stacked blocks, slightly tilted for "overflow" effect -->
  <rect x="25" y="70" width="50" height="10" rx="2" fill="#2ecc71" transform="rotate(-2, 50, 75)"/>
  <rect x="25" y="58" width="50" height="10" rx="2" fill="#3498db" transform="rotate(3, 50, 63)"/>
  <rect x="25" y="46" width="50" height="10" rx="2" fill="#9b59b6" transform="rotate(-4, 50, 51)"/>
  <rect x="25" y="34" width="50" height="10" rx="2" fill="#e74c3c" transform="rotate(5, 50, 39)"/>
  <rect x="25" y="22" width="50" height="10" rx="2" fill="#f1c40f" transform="rotate(-6, 50, 27)"/>
  <!-- Top block falling off -->
  <rect x="30" y="8" width="50" height="10" rx="2" fill="#1abc9c" transform="rotate(15, 55, 13)" opacity="0.85"/>
  <!-- Overflow text -->
  <text x="50" y="96" font-family="monospace" font-size="7" fill="white" text-anchor="middle" opacity="0.8">OVERFLOW!</text>
</svg>