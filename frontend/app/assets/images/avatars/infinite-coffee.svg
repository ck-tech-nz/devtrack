<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="12" fill="#3e2723"/>
  <!-- Saucer -->
  <ellipse cx="50" cy="82" rx="30" ry="6" fill="#5d4037"/>
  <!-- Mug body -->
  <rect x="25" y="45" width="45" height="35" rx="4" fill="white"/>
  <rect x="25" y="45" width="45" height="35" rx="4" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <!-- Handle -->
  <path d="M70 52 Q82 52 82 62 Q82 72 70 72" stroke="white" stroke-width="5" fill="none"/>
  <path d="M70 52 Q82 52 82 62 Q82 72 70 72" stroke="#e0e0e0" stroke-width="1" fill="none"/>
  <!-- Coffee inside -->
  <rect x="28" y="50" width="39" height="27" rx="2" fill="#6d4c41"/>
  <!-- Steam -->
  <path d="M35 42 Q33 32 37 22" stroke="#bdbdbd" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M47 40 Q45 28 49 18" stroke="#bdbdbd" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M59 42 Q57 32 61 24" stroke="#bdbdbd" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- while(true) text on mug -->
  <text x="47" y="68" font-family="monospace" font-size="6" fill="white" text-anchor="middle">while</text>
  <text x="47" y="76" font-family="monospace" font-size="6" fill="white" text-anchor="middle">(true)</text>
  <!-- Infinity symbol in steam -->
  <text x="47" y="12" font-size="14" fill="#ffcc80" text-anchor="middle" opacity="0.8">&#x221E;</text>
</svg>