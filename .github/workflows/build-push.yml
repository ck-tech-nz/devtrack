name: Build and Push Services

on:
  push:
    branches:
      - env/test
      - env/prod

env:
  REGISTRY: registry.aimenu.tech
  REGISTRY_USERNAME: ck
  PROJECT_NAME: devtrack

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set environment based on branch
        id: set-env
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT

          if [[ "$BRANCH_NAME" == "env/prod" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
          else
            echo "env=test" >> $GITHUB_OUTPUT
          fi

      - name: Generate VERSION files
        run: |
          SHORT_SHA=${GITHUB_SHA:0:7}
          BUILD_DATE=$(date +'%Y-%m-%d-%H:%M:%S')
          VERSION="${BUILD_DATE}-${SHORT_SHA}"
          echo "$VERSION" > backend/VERSION
          echo "$VERSION" > frontend/VERSION
          echo "VERSION=$VERSION"

      - name: Login to Docker Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ secrets.ARTIFACT_REGISTRY_PRIVATE_KEY }}

      - name: Build and push Backend image
        env:
          DOCKER_BUILDKIT: 1
        run: |
          SHORT_SHA=${GITHUB_SHA:0:7}
          ENV=${{ steps.set-env.outputs.env }}
          IMAGE_NAME="${{ env.REGISTRY }}/${{ env.PROJECT_NAME }}/backend-${ENV}"

          docker build \
            -f backend/Dockerfile \
            -t ${IMAGE_NAME}:latest \
            -t ${IMAGE_NAME}:${SHORT_SHA} \
            .

          docker push ${IMAGE_NAME} --all-tags

      - name: Build and push Frontend image
        env:
          DOCKER_BUILDKIT: 1
        run: |
          SHORT_SHA=${GITHUB_SHA:0:7}
          ENV=${{ steps.set-env.outputs.env }}
          IMAGE_NAME="${{ env.REGISTRY }}/${{ env.PROJECT_NAME }}/frontend-${ENV}"

          docker build \
            -t ${IMAGE_NAME}:latest \
            -t ${IMAGE_NAME}:${SHORT_SHA} \
            ./frontend

          docker push ${IMAGE_NAME} --all-tags

      - name: Summary
        run: |
          SHORT_SHA=${GITHUB_SHA:0:7}
          ENV=${{ steps.set-env.outputs.env }}
          echo "✅ Build and push completed"
          echo "   Environment: ${ENV}"
          echo "   Backend:  ${{ env.REGISTRY }}/${{ env.PROJECT_NAME }}/backend-${ENV}:${SHORT_SHA}"
          echo "   Frontend: ${{ env.REGISTRY }}/${{ env.PROJECT_NAME }}/frontend-${ENV}:${SHORT_SHA}"

  notify:
    needs: [build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify success
        if: needs.build.result == 'success'
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          ENV_NAME=$(echo $BRANCH_NAME | cut -d'/' -f2)
          curl "https://api.day.app/6T7AMV3JFUQLkYtRE6h7mF/GitHub/${{ env.PROJECT_NAME }}%20%5B${ENV_NAME}%5D%20build%20success"

      - name: Notify failure
        if: needs.build.result == 'failure'
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          ENV_NAME=$(echo $BRANCH_NAME | cut -d'/' -f2)
          curl "https://api.day.app/6T7AMV3JFUQLkYtRE6h7mF/GitHub/${{ env.PROJECT_NAME }}%20%5B${ENV_NAME}%5D%20build%20FAILED"
