name: Build and Push Services

on:
  push:
    branches:
      - backend/env/test
      - backend/env/prod
      - frontend/env/test
      - frontend/env/prod

env:
  REGISTRY: registry.aimenu.tech
  REGISTRY_USERNAME: ck
  PROJECT_NAME: devtracker

jobs:
  build-backend:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/backend/env/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set environment based on branch
        id: set-env
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT

          if [[ "$BRANCH_NAME" == "backend/env/prod" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
            echo "image_name=backend-prod" >> $GITHUB_OUTPUT
          else
            echo "env=test" >> $GITHUB_OUTPUT
            echo "image_name=backend-test" >> $GITHUB_OUTPUT
          fi

      - name: Generate VERSION file
        run: |
          SHORT_SHA=${GITHUB_SHA:0:7}
          BUILD_DATE=$(date +'%Y-%m-%d-%H:%M:%S')
          echo "${BUILD_DATE}-${SHORT_SHA}" > backend/VERSION
          cat backend/VERSION

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ secrets.ARTIFACT_REGISTRY_PRIVATE_KEY }}

      - name: Build and push Backend image
        env:
          DOCKER_BUILDKIT: 1
        run: |
          SHORT_SHA=${GITHUB_SHA:0:7}
          IMAGE_NAME="${{ env.REGISTRY }}/${{ env.PROJECT_NAME }}/${{ steps.set-env.outputs.image_name }}"

          docker build \
            -f backend/Dockerfile \
            -t ${IMAGE_NAME}:latest \
            -t ${IMAGE_NAME}:${SHORT_SHA} \
            .

          docker push ${IMAGE_NAME} --all-tags

      - name: Summary
        run: |
          SHORT_SHA=${GITHUB_SHA:0:7}
          echo "✅ Backend service built and pushed successfully"
          echo "   Environment: ${{ steps.set-env.outputs.env }}"
          echo "   Branch: ${{ steps.set-env.outputs.branch }}"
          echo "   Image: ${{ env.REGISTRY }}/${{ env.PROJECT_NAME }}/${{ steps.set-env.outputs.image_name }}"
          echo "   Tags: latest, ${SHORT_SHA}"

  build-frontend:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/frontend/env/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set environment based on branch
        id: set-env
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT

          if [[ "$BRANCH_NAME" == "frontend/env/prod" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
            echo "image_name=frontend-prod" >> $GITHUB_OUTPUT
          else
            echo "env=test" >> $GITHUB_OUTPUT
            echo "image_name=frontend-test" >> $GITHUB_OUTPUT
          fi

      - name: Generate VERSION file
        run: |
          SHORT_SHA=${GITHUB_SHA:0:7}
          BUILD_DATE=$(date +'%Y-%m-%d-%H:%M:%S')
          echo "${BUILD_DATE}-${SHORT_SHA}" > frontend/VERSION
          cat frontend/VERSION

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ secrets.ARTIFACT_REGISTRY_PRIVATE_KEY }}

      - name: Build and push Frontend image
        env:
          DOCKER_BUILDKIT: 1
        run: |
          SHORT_SHA=${GITHUB_SHA:0:7}
          IMAGE_NAME="${{ env.REGISTRY }}/${{ env.PROJECT_NAME }}/${{ steps.set-env.outputs.image_name }}"

          docker build \
            -t ${IMAGE_NAME}:latest \
            -t ${IMAGE_NAME}:${SHORT_SHA} \
            ./frontend

          docker push ${IMAGE_NAME} --all-tags

      - name: Summary
        run: |
          SHORT_SHA=${GITHUB_SHA:0:7}
          echo "✅ Frontend service built and pushed successfully"
          echo "   Environment: ${{ steps.set-env.outputs.env }}"
          echo "   Branch: ${{ steps.set-env.outputs.branch }}"
          echo "   Image: ${{ env.REGISTRY }}/${{ env.PROJECT_NAME }}/${{ steps.set-env.outputs.image_name }}"
          echo "   Tags: latest, ${SHORT_SHA}"

  notify:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: always() && (needs.build-backend.result != 'skipped' || needs.build-frontend.result != 'skipped')
    steps:
      - name: Notify success
        if: |
          needs.build-backend.result != 'failure' && needs.build-frontend.result != 'failure'
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          SERVICE=$(echo $BRANCH_NAME | cut -d'/' -f1)
          ENV_NAME=$(echo $BRANCH_NAME | cut -d'/' -f3)
          curl "https://api.day.app/6T7AMV3JFUQLkYtRE6h7mF/GitHub/${{ env.PROJECT_NAME }}%20${SERVICE}%20%5B${ENV_NAME}%5D%20build%20success"

      - name: Notify failure
        if: |
          needs.build-backend.result == 'failure' || needs.build-frontend.result == 'failure'
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          SERVICE=$(echo $BRANCH_NAME | cut -d'/' -f1)
          ENV_NAME=$(echo $BRANCH_NAME | cut -d'/' -f3)
          curl "https://api.day.app/6T7AMV3JFUQLkYtRE6h7mF/GitHub/${{ env.PROJECT_NAME }}%20${SERVICE}%20%5B${ENV_NAME}%5D%20build%20FAILED"
